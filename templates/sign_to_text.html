{% extends 'base.html' %}
{% block content %}

<style>
.video-wrap { position: relative; width: 100%; max-width: 600px; margin: 0 auto; }
#webcam { width: 100%; border-radius: 16px; transform: scaleX(-1); }
#canvas-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); border-radius: 16px; }
.sign-badge {
    font-family: Orbitron, monospace;
    font-size: 2.5rem;
    background: linear-gradient(135deg, #22c55e, #4ade80);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    min-height: 4rem;
}
#sentence-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 16px;
    min-height: 60px;
    font-size: 1.2rem;
    letter-spacing: 2px;
    word-break: break-all;
}
</style>

<div class="glass text-center mb-4">
    <h2 class="text-success mb-1">Sign Language → Text</h2>
    <p class="text-secondary small">Show a hand sign to your camera — it converts to text in real time.</p>
</div>

<div class="row g-4">
    <div class="col-md-7">
        <div class="glass p-3">
            <div class="video-wrap">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="canvas-overlay"></canvas>
            </div>
            <div class="d-flex gap-2 mt-3 justify-content-center">
                <button id="btn-start" class="btn btn-ai px-4" onclick="startCamera()">Start Camera</button>
                <button id="btn-stop" class="btn btn-outline-danger px-4 d-none" onclick="stopCamera()">Stop</button>
            </div>
        </div>
    </div>

    <div class="col-md-5">
        <div class="glass h-100 d-flex flex-column gap-3">
            <div>
                <p class="text-secondary small mb-1">Detected sign</p>
                <div class="sign-badge" id="current-sign">—</div>
            </div>
            <div>
                <p class="text-secondary small mb-1">Built sentence</p>
                <div id="sentence-box"></div>
            </div>
            <div class="d-flex gap-2 flex-wrap mt-auto">
                <button class="btn btn-outline-success btn-sm" onclick="addWord()">Add word ↵</button>
                <button class="btn btn-outline-warning btn-sm" onclick="addSpace()">Space</button>
                <button class="btn btn-outline-danger btn-sm" onclick="clearSentence()">Clear</button>
            </div>
            <div>
                <p class="text-secondary small mb-1">Confidence hold (seconds)</p>
                <input type="range" class="form-range" id="hold-slider" min="0.5" max="3" step="0.5" value="1">
                <small class="text-secondary" id="hold-label">1s</small>
            </div>
        </div>
    </div>
</div>

<!-- MediaPipe CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('canvas-overlay');
const ctx = canvas.getContext('2d');
let hands, camera, lastLabel = '', holdStart = null, sentence = '';
const holdSlider = document.getElementById('hold-slider');

holdSlider.oninput = () => document.getElementById('hold-label').textContent = holdSlider.value + 's';

function startCamera() {
    document.getElementById('btn-start').classList.add('d-none');
    document.getElementById('btn-stop').classList.remove('d-none');

    hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(onResults);

    camera = new Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 640, height: 480
    });
    camera.start();
}

function stopCamera() {
    camera?.stop();
    document.getElementById('btn-start').classList.remove('d-none');
    document.getElementById('btn-stop').classList.add('d-none');
    document.getElementById('current-sign').textContent = '—';
}

async function onResults(results) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!results.multiHandLandmarks?.length) {
        document.getElementById('current-sign').textContent = '—';
        lastLabel = ''; holdStart = null;
        return;
    }

    const lm = results.multiHandLandmarks[0];

    // Draw skeleton
    drawConnectors(ctx, lm, HAND_CONNECTIONS, { color: '#22c55e', lineWidth: 2 });
    drawLandmarks(ctx, lm, { color: '#4ade80', lineWidth: 1, radius: 3 });

    // Send to Django
    const resp = await fetch("{% url 'predict_sign_api' %}", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ landmarks: lm })
    });
    const { label } = await resp.json();

    document.getElementById('current-sign').textContent = label || '?';

    // Auto-add to sentence after hold duration
    const holdSecs = parseFloat(holdSlider.value) * 1000;
    if (label && label === lastLabel) {
        if (!holdStart) holdStart = Date.now();
        else if (Date.now() - holdStart > holdSecs) {
            sentence += label;
            document.getElementById('sentence-box').textContent = sentence;
            holdStart = null;
        }
    } else {
        lastLabel = label;
        holdStart = null;
    }
}

function addWord() { sentence += ' '; document.getElementById('sentence-box').textContent = sentence; }
function addSpace() { sentence += ' '; document.getElementById('sentence-box').textContent = sentence; }
function clearSentence() { sentence = ''; document.getElementById('sentence-box').textContent = ''; }
</script>

{% endblock %}
