{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>A2SL AI Converter</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins;
    color:white;
    background:linear-gradient(-45deg,#020617,#0f172a,#020617,#020617);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    min-height:100vh;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.navbar{
    backdrop-filter:blur(25px);
    background:rgba(255,255,255,0.05);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.brand{
    font-family:Orbitron;
    font-size:22px;
    letter-spacing:3px;
}

.glass{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(30px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 50px rgba(0,0,0,.7);
    transition:.4s;
}

.glass:hover{
    transform:translateY(-5px);
    box-shadow:0 0 60px rgba(0,0,0,.9);
}

.btn-ai{
    background:linear-gradient(135deg,#22c55e,#4ade80);
    border:none;
    color:black;
    font-weight:600;
    padding:12px;
    border-radius:12px;
    transition:.3s;
}

.btn-ai:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px #22c55e;
}

/* Active nav link indicator */
.nav-active {
    background: rgba(34, 197, 94, 0.15) !important;
    border-color: #22c55e !important;
    color: #4ade80 !important;
}
</style>
</head>

<body>

<nav class="navbar px-4 py-3">

<span class="brand text-success">A2SL • AI</span>

<div class="ms-auto d-flex align-items-center gap-2">

<a href="{% url 'home' %}"
   class="btn btn-sm btn-outline-light {% if request.resolver_match.url_name == 'home' %}nav-active{% endif %}">
   Home
</a>

<a href="{% url 'animation' %}"
   class="btn btn-sm btn-outline-light {% if request.resolver_match.url_name == 'animation' %}nav-active{% endif %}">
   Text → Sign
</a>

<a href="{% url 'sign_to_text' %}"
   class="btn btn-sm btn-outline-light {% if request.resolver_match.url_name == 'sign_to_text' %}nav-active{% endif %}">
   🤟 Sign → Text
</a>

{% if user.is_authenticated %}
<a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
{% else %}
<a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
<a href="{% url 'signup' %}" class="btn btn-success btn-sm">Signup</a>
{% endif %}

</div>

</nav>

<div class="container py-5">
{% block content %}{% endblock %}
</div>

</body>
</html>
